<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoTrack Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container-fluid">
    <span class="navbar-brand"> EcoTrack Pro</span>
  </div>
</nav>

<div class="container mt-4">

    <!-- USER -->
    <div class="card p-3 mb-4 shadow-sm text-center">
        <input type="text" id="username" class="form-control mb-2" placeholder="Enter your name">
        <button onclick="saveUser()" class="btn btn-primary">Save</button>
        <h5 id="welcome" class="mt-2"></h5>
    </div>

    <!-- STATS -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm stat-card">
                <h6>Total CO₂</h6>
                <h4 id="totalStat">0</h4>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow-sm stat-card">
                <h6>Status</h6>
                <h4 id="statusStat">-</h4>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow-sm stat-card">
                <h6>Last Entry</h6>
                <h4 id="lastStat">-</h4>
            </div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="card p-4 shadow-sm">
        <h4>Enter Daily Activities</h4>

        <div class="row">
            <div class="col-md-4">
                <input type="number" id="travel" class="form-control" placeholder="Travel (km)">
            </div>
            <div class="col-md-4">
                <input type="number" id="electricity" class="form-control" placeholder="Electricity (kWh)">
            </div>
            <div class="col-md-4">
                <input type="number" id="food" class="form-control" placeholder="Food (meals)">
            </div>
        </div>

        <button onclick="calculate()" class="btn btn-success mt-3 w-100">
            Calculate
        </button>

        <div id="result" class="text-center mt-3"></div>
    </div>

    <!-- CHART -->
    <div class="card p-4 shadow-sm mt-4">
        <h5 class="text-center"> Dashboard</h5>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <!-- HISTORY -->
    <div class="card p-3 mt-4 shadow-sm">
        <h5> History</h5>
        <ul id="history"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
